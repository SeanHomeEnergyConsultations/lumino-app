<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Lumino Mark</title>
  <desc id="desc">Rounded square app icon with a glowing gold path forming the letter L.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08101d" />
      <stop offset="55%" stop-color="#10243b" />
      <stop offset="100%" stop-color="#173556" />
    </linearGradient>
    <linearGradient id="gold" x1="15%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%" stop-color="#f9df8f" />
      <stop offset="48%" stop-color="#e6ba58" />
      <stop offset="100%" stop-color="#b97b1e" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="20" y="20" width="472" height="472" rx="110" fill="url(#bg)" />
  <circle cx="386" cy="116" r="34" fill="#3cc2d4" opacity="0.9" />
  <circle cx="116" cy="396" r="28" fill="#183a5c" opacity="0.95" />
  <path
    d="M166 126 L166 354 Q166 389 198 389 L350 389"
    fill="none"
    stroke="url(#gold)"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="68"
    filter="url(#glow)"
  />
  <path
    d="M166 126 L166 354 Q166 389 198 389 L350 389"
    fill="none"
    stroke="#fff7cf"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.28"
    stroke-width="18"
  />
</svg>
