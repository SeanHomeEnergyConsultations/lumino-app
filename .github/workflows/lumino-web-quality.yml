name: Lumino Web Quality

on:
  pull_request:
    paths:
      - ".github/workflows/lumino-web-quality.yml"
      - "lumino-web/**"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/lumino-web-quality.yml"
      - "lumino-web/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lumino-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lumino-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run verification suite
        run: npm run verify
